name: Pull request CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-validation:
    name: Status site validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Validate HTML and the SLO contract
        run: |
          set -euo pipefail
          npx --yes html-validate@9.7.1 index.html
          python3 scripts/normalize_page_title.py --check
          python3 scripts/verify_interface_bundle.py
          node --check scripts/capture_interface_evidence.mjs
          python3 - <<'PY'
          import json
          from pathlib import Path

          document = json.loads(Path("slo.json").read_text(encoding="utf-8"))
          if not isinstance(document.get("window_days"), int) or document["window_days"] <= 0:
              raise SystemExit("slo.json window_days must be a positive integer")
          services = document.get("services")
          if not isinstance(services, list) or not services:
              raise SystemExit("slo.json services must be a non-empty array")
          required = {"id", "component", "target_pct", "sub", "domain"}
          ids = set()
          components = set()
          for index, service in enumerate(services):
              missing = required.difference(service)
              if missing:
                  raise SystemExit(f"service {index} is missing: {sorted(missing)}")
              if service["id"] in ids or service["component"] in components:
                  raise SystemExit("service ids and components must be unique")
              ids.add(service["id"])
              components.add(service["component"])
              if service["domain"] not in {"edge", "machine"}:
                  raise SystemExit("service domain must be edge or machine")
              if not isinstance(service["target_pct"], (int, float)) or not 0 < service["target_pct"] <= 100:
                  raise SystemExit("target_pct must be within (0, 100]")
          html = Path("index.html").read_text(encoding="utf-8")
          module = Path("js/reliability.js").read_text(encoding="utf-8")
          if "js/reliability.js" not in html:
              raise SystemExit("index.html does not load the service-levels module")
          if "slo.json" not in module:
              raise SystemExit("js/reliability.js does not preserve the slo.json consumer contract")
          if "/v1/reliability" not in module:
              raise SystemExit("js/reliability.js does not preserve the derived reliability API contract")
          PY

      - name: Run module tests
        run: node --test test/*.test.mjs

      - name: Check repository-local browser icon package
        run: |
          set -euo pipefail
          expected=(
            favicon.ico
            favicon-16x16.png
            favicon-32x32.png
            apple-touch-icon.png
            android-chrome-192x192.png
            android-chrome-512x512.png
            site.webmanifest
          )
          for path in "${expected[@]}"; do
            test -s "${path}"
          done

      - name: Parse committed JSON and check whitespace
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          for path in sorted(Path(".").rglob("*.json")):
              if ".git" not in path.parts:
                  json.loads(path.read_text(encoding="utf-8"))
          PY
          git diff --check

      - name: Check repository links offline
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: "--offline --no-progress --include-fragments --root-dir ${{ github.workspace }} ."
          fail: true
