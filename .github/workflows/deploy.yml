name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  normalize-source-title:
    name: Normalize source title metadata
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    outputs:
      source_changed: ${{ steps.commit.outputs.source_changed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0, Node 24
        with:
          python-version: "3.12"

      - name: Normalize Status source metadata
        run: python3 scripts/normalize_page_title.py

      - name: Commit normalized source if it changed
        id: commit
        run: |
          set -euo pipefail
          git add index.html
          if git diff --cached --quiet; then
            echo "Status title metadata unchanged"
            echo "source_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Normalize Status title metadata [skip ci]"
          git push
          echo "source_changed=true" >> "$GITHUB_OUTPUT"

  deploy:
    needs: normalize-source-title
    if: needs.normalize-source-title.outputs.source_changed != 'true'
    uses: AtlasReaper311/atlas-infra/.github/workflows/validate-static.yml@093df3f87fa4e068155455f82c9b69bffad76fb6 # atlas-infra main
    with:
      project_name: status
      site_label: status.atlas-systems.uk
      inject_build_meta: false
    secrets: inherit
