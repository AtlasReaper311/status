name: Public interface conformance

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-public-interface-conformance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate declared browser surfaces
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact surface commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: surface
          persist-credentials: false

      - name: Check out pinned interface authority
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          repository: AtlasReaper311/atlas-infra
          ref: e40d5a5cee6001df17918f69700aebb85d3d1cdd
          path: authority
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0, Node 24
        with:
          python-version: "3.12"

      - name: Validate repository declaration
        run: |
          set -euo pipefail
          test "$(git -C authority rev-parse HEAD)" = "e40d5a5cee6001df17918f69700aebb85d3d1cdd"
          python3 authority/scripts/validate_public_interface.py \
            --root authority \
            --manifest surface/.atlas/public-interface.json \
            --report "${RUNNER_TEMP}/public-interface-conformance.json"
          REPOSITORY="${GITHUB_REPOSITORY}" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(
              Path("surface/.atlas/public-interface.json").read_text(encoding="utf-8")
          )
          if manifest["repository"] != os.environ["REPOSITORY"]:
              raise SystemExit("surface manifest repository does not match the caller")
          PY

      - name: Upload conformance evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1, Node 24
        with:
          name: public-interface-conformance-${{ github.event.pull_request.head.sha || github.sha }}
          path: ${{ runner.temp }}/public-interface-conformance.json
          if-no-files-found: error
          retention-days: 14
