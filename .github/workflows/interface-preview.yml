name: Public interface preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/interface-preview.yml"
      - ".github/workflows/ci.yml"
      - "css/interface-shell.css"
      - "js/estate-search.js"
      - "js/estate-status.js"
      - "js/interface-shell.js"
      - "js/reliability.js"
      - "js/reliability-core.js"
      - "site.webmanifest"
      - "test/interface-shell.test.mjs"

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.repository }}-public-interface-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Validate and publish Status preview
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/estate-shell-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: public-interface-preview
      url: ${{ steps.deploy.outputs.atomic_url }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_PAGES_DEPLOY_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      PROJECT_NAME: status
      PAGES_BRANCH: interface-pr-${{ github.event.pull_request.number }}
    steps:
      - name: Check out preview branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Check out canonical browser icons
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          repository: AtlasReaper311/atlas-systems
          ref: main
          path: .atlas-icon-source
          sparse-checkout: |
            favicon.ico
            favicon_io
          sparse-checkout-cone-mode: false

      - name: Synchronize exact browser icons into the repository
        id: icons
        run: |
          set -euo pipefail
          cp .atlas-icon-source/favicon.ico favicon.ico
          cp .atlas-icon-source/favicon_io/favicon-16x16.png favicon-16x16.png
          cp .atlas-icon-source/favicon_io/favicon-32x32.png favicon-32x32.png
          cp .atlas-icon-source/favicon_io/apple-touch-icon.png apple-touch-icon.png
          cp .atlas-icon-source/favicon_io/android-chrome-192x192.png android-chrome-192x192.png
          cp .atlas-icon-source/favicon_io/android-chrome-512x512.png android-chrome-512x512.png
          rm -rf .atlas-icon-source

          if git diff --quiet -- \
            favicon.ico \
            favicon-16x16.png \
            favicon-32x32.png \
            apple-touch-icon.png \
            android-chrome-192x192.png \
            android-chrome-512x512.png; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add \
              favicon.ico \
              favicon-16x16.png \
              favicon-32x32.png \
              apple-touch-icon.png \
              android-chrome-192x192.png \
              android-chrome-512x512.png
            git commit -m "assets: synchronize canonical browser icons"
            git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi
          echo "commit=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0, Node 24
        with:
          node-version: "22"

      - name: Validate Status preview candidate
        run: |
          set -euo pipefail
          npx --yes html-validate@9.7.1 index.html
          node --test test/*.test.mjs
          expected=(
            favicon.ico
            favicon-16x16.png
            favicon-32x32.png
            apple-touch-icon.png
            android-chrome-192x192.png
            android-chrome-512x512.png
            site.webmanifest
          )
          for path in "${expected[@]}"; do
            test -s "${path}"
          done
          git diff --check

      - name: Guard production boundary
        run: |
          set -euo pipefail
          test "${{ github.event.pull_request.head.ref }}" = "feat/estate-shell-v1"
          test "${PAGES_BRANCH}" != "main"
          test "${PAGES_BRANCH}" != "production"

      - name: Publish non-production Pages preview
        id: deploy
        run: |
          set -euo pipefail
          output_file="${RUNNER_TEMP}/wrangler-pages-deploy.log"
          npx --yes wrangler@4 pages deploy . \
            --project-name "${PROJECT_NAME}" \
            --branch "${PAGES_BRANCH}" \
            --commit-dirty=true 2>&1 | tee "${output_file}"
          atomic_url="$(grep -Eo 'https://[A-Za-z0-9._-]+\.pages\.dev' "${output_file}" | tail -n 1)"
          test -n "${atomic_url}"
          echo "atomic_url=${atomic_url}" >> "${GITHUB_OUTPUT}"

      - name: Attach live preview to the draft pull request
        env:
          GH_TOKEN: ${{ github.token }}
          PREVIEW_URL: ${{ steps.deploy.outputs.atomic_url }}
          PREVIEW_COMMIT: ${{ steps.icons.outputs.commit }}
        run: |
          set -euo pipefail
          marker="<!-- atlas-public-interface-preview -->"
          body="${marker}
          ## Live interface preview

          - Preview: ${PREVIEW_URL}
          - Commit: \`${PREVIEW_COMMIT}\`
          - Production: unchanged

          The approved browser icons were synchronized from \`atlas-systems/favicon_io\` before validation and deployment."
          existing_id="$(gh api "/repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" --paginate --jq ".[] | select(.body | contains(\"${marker}\")) | .id" | head -n 1)"
          if [ -n "${existing_id}" ]; then
            gh api --method PATCH "/repos/${GITHUB_REPOSITORY}/issues/comments/${existing_id}" -f body="${body}"
          else
            gh pr comment "${{ github.event.pull_request.number }}" --body "${body}"
          fi

      - name: Validate the synchronized branch head in native CI
        if: steps.icons.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run ci.yml --ref "${{ github.event.pull_request.head.ref }}"
