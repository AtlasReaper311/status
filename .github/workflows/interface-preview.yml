name: Public interface preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/interface-preview.yml"
      - ".github/workflows/ci.yml"
      - "android-chrome-*.png"
      - "apple-touch-icon.png"
      - "css/**"
      - "docs/PHASE-C-STATUS-INTERFACE-V2.md"
      - "favicon*"
      - "index.html"
      - "js/**"
      - "scripts/capture_interface_evidence.mjs"
      - "scripts/normalize_page_title.py"
      - "scripts/verify_interface_bundle.py"
      - "site.webmanifest"
      - "slo.json"
      - "static/vendor/atlas-interface/**"
      - "test/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-public-interface-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Status preview candidate
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out exact pull request head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Validate source and interface contracts
        run: |
          set -euo pipefail
          npx --yes html-validate@9.7.1 index.html
          node --check scripts/capture_interface_evidence.mjs
          node --test test/*.test.mjs
          python3 scripts/normalize_page_title.py --check
          python3 scripts/verify_interface_bundle.py
          expected=(
            favicon.ico
            favicon-16x16.png
            favicon-32x32.png
            apple-touch-icon.png
            android-chrome-192x192.png
            android-chrome-512x512.png
            site.webmanifest
          )
          for path in "${expected[@]}"; do
            test -s "${path}"
          done
          python3 - <<'PY'
          import json
          from pathlib import Path

          for path in sorted(Path(".").rglob("*.json")):
              if ".git" not in path.parts:
                  json.loads(path.read_text(encoding="utf-8"))
          PY
          git diff --check

      - name: Check repository links offline
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: "--offline --no-progress --include-fragments --root-dir ${{ github.workspace }} ."
          format: detailed
          output: interface-link-report.txt
          fail: true

      - name: Upload interface link report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: status-interface-link-report
          path: interface-link-report.txt
          if-no-files-found: warn
          retention-days: 7

  deploy-preview:
    name: Publish non-production Status preview
    needs: validate
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: public-interface-preview
      url: ${{ steps.deploy.outputs.atomic_url }}
    outputs:
      preview_url: ${{ steps.deploy.outputs.atomic_url }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_PAGES_DEPLOY_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      PROJECT_NAME: status
      PAGES_BRANCH: interface-pr-${{ github.event.pull_request.number }}
      SOURCE_BRANCH: ${{ github.event.pull_request.head.ref }}
    steps:
      - name: Check out exact pull request head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Guard production boundary
        run: |
          set -euo pipefail
          test "${{ github.event.pull_request.base.ref }}" = "main"
          test "${SOURCE_BRANCH}" != "main"
          test "${SOURCE_BRANCH}" != "production"
          test "${PAGES_BRANCH}" != "main"
          test "${PAGES_BRANCH}" != "production"

      - name: Publish branch preview
        id: deploy
        run: |
          set -euo pipefail
          output_file="${RUNNER_TEMP}/wrangler-pages-deploy.log"
          npx --yes wrangler@4.113.0 pages deploy . \
            --project-name "${PROJECT_NAME}" \
            --branch "${PAGES_BRANCH}" \
            --commit-dirty=true 2>&1 | tee "${output_file}"
          atomic_url="$(grep -Eo 'https://[A-Za-z0-9._-]+\.pages\.dev' "${output_file}" | tail -n 1)"
          test -n "${atomic_url}"
          echo "atomic_url=${atomic_url}" >> "${GITHUB_OUTPUT}"

      - name: Attach exact preview to the pull request
        env:
          GH_TOKEN: ${{ github.token }}
          PREVIEW_URL: ${{ steps.deploy.outputs.atomic_url }}
        run: |
          set -euo pipefail
          marker="<!-- atlas-status-interface-preview -->"
          body="${marker}
          ## Live Status interface preview

          - Preview: ${PREVIEW_URL}
          - Commit: \`${{ github.event.pull_request.head.sha }}\`
          - Production: unchanged

          Browser and accessibility evidence is captured from this exact deployment."
          existing_id="$(gh api "/repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" --paginate --jq ".[] | select(.body | contains(\"${marker}\")) | .id" | head -n 1)"
          if [ -n "${existing_id}" ]; then
            gh api --method PATCH "/repos/${GITHUB_REPOSITORY}/issues/comments/${existing_id}" -f body="${body}"
          else
            gh pr comment "${{ github.event.pull_request.number }}" --body "${body}"
          fi

  capture-evidence:
    name: Capture deterministic Status evidence
    needs: deploy-preview
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PREVIEW_URL: ${{ needs.deploy-preview.outputs.preview_url }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - name: Check out evidence runner
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          sparse-checkout: scripts/capture_interface_evidence.mjs
          sparse-checkout-cone-mode: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Install pinned browser and accessibility tooling
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/status-interface-evidence"
          cp scripts/capture_interface_evidence.mjs "${RUNNER_TEMP}/status-interface-evidence/"
          cd "${RUNNER_TEMP}/status-interface-evidence"
          npm init -y >/dev/null
          npm install --save-exact playwright@1.61.1 @axe-core/playwright@4.12.1
          npm audit --audit-level=high
          npx playwright install --with-deps firefox

      - name: Capture governed browser and viewport matrix
        working-directory: ${{ runner.temp }}/status-interface-evidence
        run: node capture_interface_evidence.mjs

      - name: Upload visual and accessibility evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: status-interface-preview-evidence
          path: |
            ${{ runner.temp }}/status-interface-evidence/evidence.json
            ${{ runner.temp }}/status-interface-evidence/capture-error.txt
            ${{ runner.temp }}/status-interface-evidence/screenshots/*.png
          if-no-files-found: error
          retention-days: 14
